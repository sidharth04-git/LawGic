<style>
    :root {
        --primary-color: #0077b6;
        --secondary-color: #90e0ef;
        --background-color: #e0f7fa;
        --text-color: #023047;
        --border-radius: 10px;
        --box-shadow: 0 4px 15px rgba(0, 119, 182, 0.2);
    }
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--background-color);
        margin: 40px;
        color: var(--text-color);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: flex-start;
    }
    .container {
        max-width: 700px;
        background: white;
        padding: 30px 40px;
        border-radius: var(--border-radius);
        box-shadow: var(--box-shadow);
        text-align: center;
    }
    h1 {
        color: var(--primary-color);
        margin-bottom: 30px;
        font-weight: 700;
        font-size: 2.5rem;
        letter-spacing: 2px;
        user-select: none;
    }
    label {
        display: inline-block;
        width: 140px;
        text-align: right;
        margin-right: 15px;
        font-weight: 600;
        font-size: 1rem;
        color: var(--primary-color);
    }
    select {
        width: 240px;
        padding: 8px 12px;
        font-size: 1rem;
        border: 2px solid var(--secondary-color);
        border-radius: var(--border-radius);
        background-color: #ffffff;
        color: var(--text-color);
        transition: border-color 0.3s ease, box-shadow 0.3s ease;
        cursor: pointer;
    }
    select:focus {
        border-color: #00b4d8;
        outline: none;
        box-shadow: 0 0 8px rgba(0, 180, 216, 0.4);
    }
    .form-row {
        margin-bottom: 25px;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .ngo-details {
        margin-top: 20px;
        padding: 15px;
        border-radius: var(--border-radius);
        box-shadow: var(--box-shadow);
        background: #f9f9f9;
        text-align: left;
    }
    .ngo-details h3 {
        margin: 5px 0;
        color: var(--primary-color);
    }
    .ngo-details p {
        margin: 3px 0;
    }
    a {
        color: #0077b6;
        text-decoration: none;
    }
    a:hover {
        text-decoration: underline;
    }
</style>

const stateSelect = document.getElementById('state');
const districtSelect = document.getElementById('district');
const ngoRow = document.getElementById('ngo-row');
const ngoSelect = document.getElementById('ngo');
const ngoDetails = document.getElementById('ngo-details');

stateSelect.addEventListener('change', () => {
    const selectedState = stateSelect.value;
    districtSelect.innerHTML = '<option value="">--Select District--</option>';
    districtSelect.disabled = true;
    ngoRow.style.display = "none";
    ngoDetails.style.display = "none";

    if (selectedState && stateDistrictMap[selectedState]) {
        stateDistrictMap[selectedState].forEach(district => {
            const option = document.createElement('option');
            option.value = district.toLowerCase().replace(/ /g, '-');
            option.textContent = district;
            districtSelect.appendChild(option);
        });
        districtSelect.disabled = false;

        let ngoList = [];
        if (selectedState === "andhra-pradesh") ngoList = ngosAndhra;
        else if (selectedState === "arunachal-pradesh") ngoList = ngosArunachal;
        else if (selectedState === "assam") ngoList = ngosAssam;
        else if (selectedState === "bihar") ngoList = ngosBihar;
        else if (selectedState === "uttar-pradesh") ngoList = ngosUttarPradesh;
        else if (selectedState === "uttarakhand") ngoList = ngosUttarakhand;
        else if (selectedState === "chandigarh") ngoList = ngosChandigarh;
        else if (selectedState === "chhattisgarh") ngoList = ngosChhattisgarh;
        else if (selectedState === "punjab") ngoList = ngosPunjab;

        if (ngoList.length > 0) {
            ngoRow.style.display = "flex";
            ngoSelect.innerHTML = '<option value="">--Select NGO--</option>';
            ngoList.forEach((ngo, index) => {
                const option = document.createElement('option');
                option.value = index;
                option.textContent = ngo.name;
                ngoSelect.appendChild(option);
            });
            ngoSelect.dataset.state = selectedState;
        }
    }
});

ngoSelect.addEventListener('change', () => {
    const selectedIndex = ngoSelect.value;
    const selectedState = ngoSelect.dataset.state;
    let ngoList = [];

    if (selectedState === "andhra-pradesh") ngoList = ngosAndhra;
    else if (selectedState === "arunachal-pradesh") ngoList = ngosArunachal;
    else if (selectedState === "assam") ngoList = ngosAssam;
    else if (selectedState === "bihar") ngoList = ngosBihar;
    else if (selectedState === "uttar-pradesh") ngoList = ngosUttarPradesh;
    else if (selectedState === "uttarakhand") ngoList = ngosUttarakhand;
    else if (selectedState === "chandigarh") ngoList = ngosChandigarh;
    else if (selectedState === "chhattisgarh") ngoList = ngosChhattisgarh;
    else if (selectedState === "punjab") ngoList = ngosPunjab;

    if (selectedIndex !== "" && ngoList[selectedIndex]) {
        const ngo = ngoList[selectedIndex];
        ngoDetails.innerHTML = `
            <h3>${ngo.name}</h3>
            <p><strong>Focus:</strong> ${ngo.focus}</p>
            <p><strong>Website:</strong> ${ngo.website !== "Not listed" ? `<a href="${ngo.website}" target="_blank" rel="noopener noreferrer">${ngo.website}</a>` : "Not listed"}</p>
            <p><strong>Location:</strong> ${ngo.location}</p>
        `;
        ngoDetails.style.display = "block";
    } else {
        ngoDetails.style.display = "none";
    }
});
