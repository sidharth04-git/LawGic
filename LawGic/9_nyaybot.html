<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Legal AI Chatbot</title>
  <link rel="stylesheet" href="9_nyaybot.css" />
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
  <div class="chatbot-container">
    <header class="chatbot-header">⚖ Legal AI Assistant</header>

    <div class="language-select">
      <label for="language">Choose Language:</label>
      <select id="language" aria-label="Select chat language">
        <option value="en-US" selected>English</option>
        <option value="hi-IN">Hindi</option>
      </select>
      <button id="listen-btn" title="Start/Stop speech" aria-label="Listen to last bot message">🔊 Listen</button>
    </div>

    <div id="chat-window" class="chat-window" aria-live="polite" role="log"></div>

    <form id="chat-form" class="chat-form" aria-label="Chat input form">
      <input type="text" id="user-input" placeholder="Ask your legal question..." autocomplete="off" required aria-label="Ask your legal question" />
      <button type="button" id="mic-btn" title="Speak your question" aria-label="Speak your question">🎙</button>
      <button type="submit" aria-label="Send question">Send</button>
    </form>
  </div>

  <script src="9_nyaybot.js"></script>
</body>
</html>
